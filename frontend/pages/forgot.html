<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Manipal Eats</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

<div class="auth-box">
  <a href="/" class="auth-brand">Manipal Eats</a>
  <h1>Reset password</h1>
  <p class="auth-sub">Answer your security question to reset your password</p>

  <!-- Step 1: Email -->
  <div id="step1">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div id="step1-error" class="form-error" style="margin-bottom:.5rem"></div>
    <button class="btn btn-primary" style="width:100%" id="step1-btn" onclick="fetchQuestion()">Continue</button>
  </div>

  <!-- Step 2: Answer + new password -->
  <div id="step2" style="display:none">
    <div style="background:var(--bg);padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;border:1px solid var(--border)">
      <div style="font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:.3rem">Security question</div>
      <div id="question-text" style="font-weight:600;color:var(--text)"></div>
    </div>
    <div class="form-group">
      <label for="answer">Your answer</label>
      <input type="text" id="answer" placeholder="Type your answer" />
    </div>
    <div class="form-group">
      <label for="new_password">New password</label>
      <input type="password" id="new_password" placeholder="Min. 6 characters" />
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" placeholder="Repeat new password" />
    </div>
    <div id="step2-error" class="form-error" style="margin-bottom:.5rem"></div>
    <button class="btn btn-primary" style="width:100%" id="step2-btn" onclick="resetPassword()">Reset Password</button>
    <button class="btn btn-outline" style="width:100%;margin-top:.5rem" onclick="goBack()">Back</button>
  </div>

  <div class="auth-footer" style="margin-top:1rem">
    <a href="/login">Back to login</a>
  </div>
</div>

<div id="toast"></div>
<script src="/js/utils.js"></script>
<script>
  var emailUsed = '';

  async function fetchQuestion() {
    var errEl = document.getElementById('step1-error');
    var btn   = document.getElementById('step1-btn');
    errEl.textContent = '';

    var email = document.getElementById('email').value.trim();
    if (!email) { errEl.textContent = 'Please enter your email.'; return; }

    btn.disabled = true;
    btn.textContent = 'Checking…';

    try {
      var data = await API.post('/auth/security-question', { email: email });
      emailUsed = email;
      document.getElementById('question-text').textContent = data.question;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Continue';
    }
  }

  async function resetPassword() {
    var errEl        = document.getElementById('step2-error');
    var btn          = document.getElementById('step2-btn');
    errEl.textContent = '';

    var answer       = document.getElementById('answer').value.trim();
    var new_password = document.getElementById('new_password').value;
    var confirm      = document.getElementById('confirm_password').value;

    if (!answer || !new_password) { errEl.textContent = 'Please fill all fields.'; return; }
    if (new_password.length < 6)  { errEl.textContent = 'Password must be at least 6 characters.'; return; }
    if (new_password !== confirm)  { errEl.textContent = 'Passwords do not match.'; return; }

    btn.disabled = true;
    btn.textContent = 'Resetting…';

    try {
      await API.post('/auth/reset-password', {
        email: emailUsed,
        answer: answer,
        new_password: new_password
      });
      showToast('Password reset successfully! Redirecting to login…', 'success', 2500);
      setTimeout(function() { window.location.href = '/login'; }, 2000);
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }

  function goBack() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    document.getElementById('step1-btn').disabled = false;
    document.getElementById('step1-btn').textContent = 'Continue';
  }
</script>
</body>
</html>
